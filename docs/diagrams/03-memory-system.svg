<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" width="1000" height="750">
  <style>text{font-family:'SF Mono','Fira Code','Cascadia Code','Courier New',monospace;}</style>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/><stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#34d399"/></marker>
    <marker id="ap" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#a855f7"/></marker>
  </defs>

  <rect width="1000" height="750" fill="url(#bg)"/>

  <text x="500" y="26" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">Dual-Core Memory Engine (双核记忆引擎)</text>
  <line x1="260" y1="34" x2="740" y2="34" stroke="#10b981" stroke-width="1" opacity="0.5"/>

  <!-- MemoryManager CENTER -->
  <rect x="370" y="50" width="260" height="168" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2.5"/>
  <text x="500" y="72" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">MemoryManager</text>
  <text x="500" y="90" text-anchor="middle" fill="#6ee7b7" font-size="9">Unified Orchestrator (统一调度枢纽)</text>
  <line x1="385" y1="98" x2="615" y2="98" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>

  <text x="385" y="114" fill="#34d399" font-size="8">start_task(task) / end_task(success, result)</text>
  <text x="385" y="130" fill="#34d399" font-size="8">locate_and_get_context(hash, layout, task)</text>
  <text x="385" y="146" fill="#a855f7" font-size="8">update_state_and_transition(h, l, a, t)</text>
  <text x="385" y="162" fill="#34d399" font-size="8">add_step(thinking, action, app)</text>
  <text x="385" y="178" fill="#34d399" font-size="8">get_relevant_context(task)</text>
  <text x="385" y="194" fill="#34d399" font-size="8">build_personalized_prompt(base, mm, task)</text>
  <text x="385" y="210" fill="#34d399" font-size="8">commit_pending(index)</text>

  <text x="500" y="236" text-anchor="middle" fill="#64748b" font-size="7">^ called by PhoneAgent._execute_step() ^</text>

  <!-- MemoryStore LEFT -->
  <rect x="25" y="50" width="235" height="195" rx="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="142" y="72" text-anchor="middle" fill="#34d399" font-size="13" font-weight="bold">MemoryStore</text>
  <text x="142" y="90" text-anchor="middle" fill="#6ee7b7" font-size="9">FAISS Vector Store (2048d)</text>
  <line x1="38" y1="96" x2="248" y2="96" stroke="#10b981" stroke-width="0.5" opacity="0.2"/>

  <text x="38" y="112" fill="#6ee7b7" font-size="8">EmbeddingClient</text>
  <text x="48" y="126" fill="#64748b" font-size="7">embedding-3 API (primary, 2048d)</text>

  <text x="38" y="144" fill="#6ee7b7" font-size="8">SimpleEmbedder (fallback)</text>
  <text x="48" y="158" fill="#64748b" font-size="7">Character hash 128d padded to 2048d</text>

  <line x1="38" y1="166" x2="248" y2="166" stroke="#10b981" stroke-width="0.3" opacity="0.15"/>

  <text x="38" y="182" fill="#6ee7b7" font-size="8">FAISS IndexFlatIP</text>
  <text x="48" y="196" fill="#64748b" font-size="7">L2 Normalization = Cosine Similarity</text>

  <text x="38" y="214" fill="#6ee7b7" font-size="8">Score = similarity x 0.7 + importance x 0.3</text>

  <rect x="38" y="230" width="209" height="14" rx="3" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
  <text x="142" y="240" text-anchor="middle" fill="#475569" font-size="6">13 MemoryType enums (CONTACT_APP_BINDING, UI_STATE, ...)</text>

  <!-- GraphStore RIGHT -->
  <rect x="740" y="50" width="235" height="195" rx="8" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="857" y="72" text-anchor="middle" fill="#34d399" font-size="13" font-weight="bold">GraphStore</text>
  <text x="857" y="90" text-anchor="middle" fill="#6ee7b7" font-size="9">Neo4j Spatial Memory</text>
  <line x1="753" y1="96" x2="962" y2="96" stroke="#10b981" stroke-width="0.5" opacity="0.2"/>

  <!-- Mini graph inside -->
  <rect x="765" y="108" width="72" height="20" rx="4" fill="#0f172a" stroke="#475569" stroke-width="0.7"/>
  <text x="801" y="122" text-anchor="middle" fill="#93c5fd" font-size="7">UIState</text>
  <rect x="870" y="108" width="72" height="20" rx="4" fill="#0f172a" stroke="#475569" stroke-width="0.7"/>
  <text x="906" y="122" text-anchor="middle" fill="#fdba74" font-size="7">Action</text>
  <rect x="765" y="142" width="72" height="20" rx="4" fill="#0f172a" stroke="#475569" stroke-width="0.7"/>
  <text x="801" y="156" text-anchor="middle" fill="#93c5fd" font-size="7">UIState</text>
  <line x1="837" y1="118" x2="868" y2="118" stroke="#f97316" stroke-width="0.8" marker-end="url(#ap)"/>
  <text x="850" y="114" fill="#64748b" font-size="5">NEXT_ACTION</text>
  <line x1="906" y1="128" x2="801" y2="148" stroke="#f97316" stroke-width="0.8" marker-end="url(#ap)"/>
  <text x="850" y="144" fill="#64748b" font-size="5">PRODUCES</text>

  <text x="753" y="180" fill="#6ee7b7" font-size="8">TaskIndex</text>
  <text x="763" y="194" fill="#64748b" font-size="7">FAISS IndexFlatIP (2048d)</text>
  <text x="763" y="208" fill="#64748b" font-size="7">task_index.npy + task_ids.json</text>

  <text x="753" y="228" fill="#6ee7b7" font-size="8">Trajectory</text>
  <text x="763" y="242" fill="#64748b" font-size="7">pending_trajectories.json (max 20)</text>

  <!-- StateManager BOTTOM LEFT -->
  <rect x="25" y="278" width="235" height="90" rx="8" fill="#052e16" stroke="#10b981" stroke-width="1.3" stroke-dasharray="5,3"/>
  <text x="142" y="298" text-anchor="middle" fill="#34d399" font-size="12" font-weight="bold">StateManager</text>
  <text x="142" y="316" text-anchor="middle" fill="#6ee7b7" font-size="8">Unified State Tracker (NEW v4.0)</text>
  <line x1="38" y1="322" x2="248" y2="322" stroke="#10b981" stroke-width="0.3" opacity="0.15"/>

  <text x="38" y="338" fill="#6ee7b7" font-size="8">compute_state_id(hash, layout)</text>
  <text x="48" y="352" fill="#64748b" font-size="7">-> state_{layout}_{hash[:8]}</text>
  <text x="38" y="368" fill="#6ee7b7" font-size="8">update_state(new_id) -> (prev, current)</text>

  <!-- ClarificationAgent BOTTOM RIGHT -->
  <rect x="740" y="278" width="235" height="90" rx="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="857" y="298" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="bold">ClarificationAgent</text>
  <text x="857" y="316" text-anchor="middle" fill="#a78bfa" font-size="8">HITL Task Ambiguity Detection</text>
  <line x1="753" y1="322" x2="962" y2="322" stroke="#a855f7" stroke-width="0.3" opacity="0.2"/>

  <text x="753" y="338" fill="#a78bfa" font-size="8">check_and_clarify(task, img, app)</text>
  <text x="763" y="352" fill="#64748b" font-size="7">-> ClarifyResult dataclass</text>
  <text x="753" y="368" fill="#a78bfa" font-size="8">_detect_ambiguity() + _reconstruct_task()</text>

  <!-- READ/WRITE ARROWS -->
  <!-- WRITE add_step -> MemoryStore -->
  <path d="M 385 162 L 262 162" stroke="#34d399" stroke-width="2" fill="none" stroke-dasharray="7,4" marker-end="url(#ag)"/>
  <text x="320" y="156" fill="#34d399" font-size="7">WRITE add_step()</text>

  <!-- READ locate -> MemoryStore -->
  <path d="M 385 130 L 262 130" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <text x="320" y="124" fill="#34d399" font-size="7">READ search</text>

  <!-- READ context -> MemoryStore -->
  <path d="M 385 178 L 262 178" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <text x="318" y="172" fill="#34d399" font-size="7">READ context</text>

  <!-- READ locate -> GraphStore -->
  <path d="M 630 130 L 738 130" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <text x="682" y="124" fill="#34d399" font-size="7">READ find_similar_tasks</text>

  <!-- WRITE state -> StateManager -->
  <path d="M 440 220 L 440 263 L 142 263 L 142 276" stroke="#a855f7" stroke-width="2" fill="none" stroke-dasharray="7,4" marker-end="url(#ap)"/>
  <text x="270" y="256" fill="#a855f7" font-size="7">WRITE state</text>

  <!-- WRITE transition -> GraphStore -->
  <path d="M 560 220 L 560 258 L 857 258 L 857 276" stroke="#a855f7" stroke-width="2" fill="none" stroke-dasharray="7,4" marker-end="url(#ap)"/>
  <text x="710" y="252" fill="#a855f7" font-size="7">WRITE transition</text>

  <!-- Auto-Learning Box -->
  <rect x="25" y="393" width="235" height="68" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.9"/>
  <text x="142" y="411" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="bold">Auto-Learning Pipeline</text>
  <line x1="38" y1="418" x2="248" y2="418" stroke="#334155" stroke-width="0.3"/>
  <text x="38" y="434" fill="#64748b" font-size="7">_track_app_usage() -> APP_USAGE</text>
  <text x="38" y="448" fill="#64748b" font-size="7">_learn_from_action() -> CONTACT / Pattern</text>
  <text x="38" y="462" fill="#64748b" font-size="7">_learn_from_thinking() -> Preference</text>

  <!-- Session Context -->
  <rect x="740" y="393" width="235" height="68" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.9"/>
  <text x="857" y="411" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="bold">Session Context</text>
  <line x1="753" y1="418" x2="962" y2="418" stroke="#334155" stroke-width="0.3"/>
  <text x="753" y="434" fill="#64748b" font-size="7">session_history: list[dict]</text>
  <text x="753" y="448" fill="#64748b" font-size="7">_session_contacts: set (dedup)</text>
  <text x="753" y="462" fill="#64748b" font-size="7">_session_apps: set (dedup)</text>

  <!-- LEGEND -->
  <rect x="240" y="486" width="520" height="60" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="500" y="504" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="bold">Legend</text>
  <line x1="260" y1="522" x2="310" y2="522" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#ag)"/>
  <text x="318" y="526" fill="#94a3b8" font-size="8">READ path (solid) - data retrieval from stores</text>
  <line x1="260" y1="538" x2="310" y2="538" stroke="#34d399" stroke-width="2" fill="none" stroke-dasharray="7,4" marker-end="url(#ag)"/>
  <text x="318" y="542" fill="#94a3b8" font-size="8">WRITE path (dashed) - data storage to stores</text>

  <!-- Bottom note -->
  <rect x="240" y="565" width="520" height="48" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="500" y="583" text-anchor="middle" fill="#34d399" font-size="9" font-weight="bold">Unified Embedding Space: 2048d (embedding-3 API)</text>
  <text x="500" y="600" text-anchor="middle" fill="#64748b" font-size="8">MemoryStore (2048d) is compatible with TaskIndex (2048d) - cross-searchable</text>

  <!-- Storage file label -->
  <rect x="25" y="565" width="200" height="48" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="125" y="583" text-anchor="middle" fill="#475569" font-size="8" font-weight="bold">Storage</text>
  <text x="125" y="600" text-anchor="middle" fill="#64748b" font-size="7">memory_db/{user_id}/*</text>
</svg>