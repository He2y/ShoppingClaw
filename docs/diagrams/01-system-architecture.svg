  <text x="27" y="154" fill="#7c3aed" font-size="9" font-weight="bold">AGENT CORE / 代理核心</text>
  <rect x="450" y="158" width="200" height="72" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="182" text-anchor="middle" fill="#111827" font-size="14" font-weight="bold">PhoneAgent</text>
