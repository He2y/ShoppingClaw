  <rect x="665" y="362" width="90" height="34" rx="5" fill="#ffffff" stroke="#fdba74" stroke-width="1"/><text x="710" y="383" text-anchor="middle" fill="#c2410c" font-size="9" font-weight="600">HDC</text>
