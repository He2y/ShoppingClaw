  <rect x="720" y="610" width="220" height="48" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="830" y="630" text-anchor="middle" fill="#7c3aed" font-size="11" font-weight="bold">ClarificationAgent</text>
  <text x="830" y="646" text-anchor="middle" fill="#6b7280" font-size="8">HITL Shopping Task Ambiguity Detection</text>

