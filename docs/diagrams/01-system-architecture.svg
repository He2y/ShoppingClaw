  <rect x="498" y="316" width="76" height="34" rx="5" fill="#ffffff" stroke="#fed7aa" stroke-width="1"/><text x="536" y="338" text-anchor="middle" fill="#c2410c" font-size="9" font-weight="600">UI-TARS</text>
  <rect x="582" y="316" width="76" height="34" rx="5" fill="#ffffff" stroke="#fed7aa" stroke-width="1"/><text x="620" y="338" text-anchor="middle" fill="#c2410c" font-size="9" font-weight="600">QwenVL</text>
  <rect x="666" y="316" width="76" height="34" rx="5" fill="#ffffff" stroke="#fed7aa" stroke-width="1"/><text x="704" y="338" text-anchor="middle" fill="#c2410c" font-size="9" font-weight="600">MAI-UI</text>
