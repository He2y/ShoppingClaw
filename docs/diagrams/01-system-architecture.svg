  <text x="830" y="534" text-anchor="middle" fill="#059669" font-size="9">Neo4j Knowledge Graph</text>
  <text x="830" y="548" text-anchor="middle" fill="#6b7280" font-size="8">UIState -> Action -> UIState</text>
  <text x="830" y="562" text-anchor="middle" fill="#6b7280" font-size="8">TaskIndex (FAISS 2048d)</text>
  <text x="830" y="576" text-anchor="middle" fill="#9ca3af" font-size="7">pending_trajectories.json</text>

  <rect x="30" y="610" width="220" height="48" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#shadow)"/>
