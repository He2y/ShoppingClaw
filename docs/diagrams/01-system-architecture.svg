  <rect x="700" y="62" width="180" height="44" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="790" y="80" text-anchor="middle" fill="#111827" font-size="12" font-weight="600">WebUI (Gradio)</text>
  <text x="790" y="96" text-anchor="middle" fill="#6b7280" font-size="9">webui.py / StreamingAgent</text>
  <path d="M 310 106 L 310 134" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#agy)"/>
