  <text x="550" y="214" text-anchor="middle" fill="#6b7280" font-size="9">run(task) -> while -> _execute_step()</text>

  <text x="690" y="178" fill="#6b7280" font-size="8">1.Screenshot 2.MemoryLookup</text>
  <text x="690" y="191" fill="#6b7280" font-size="8">3.HITL-Clarify 4.NavCheck</text>
  <text x="690" y="204" fill="#6b7280" font-size="8">5.BuildMsg 6.InjectContext</text>
  <text x="690" y="217" fill="#6b7280" font-size="8">7.VLM 8.Parse+SpecGuard</text>
  <text x="690" y="230" fill="#6b7280" font-size="8">9.Execute 10.MemoryUpdate</text>

