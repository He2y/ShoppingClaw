  <line x1="370" y1="701" x2="400" y2="701" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/><text x="407" y="705" fill="#6b7280" font-size="9">Model / VLM</text>
  <line x1="495" y1="701" x2="525" y2="701" stroke="#ea580c" stroke-width="1.5" marker-end="url(#ao)"/><text x="532" y="705" fill="#6b7280" font-size="9">Action / Device</text>
  <line x1="635" y1="701" x2="665" y2="701" stroke="#059669" stroke-width="1.5" marker-end="url(#agg)"/><text x="672" y="705" fill="#6b7280" font-size="9">Memory / State</text>

  <text x="550" y="742" text-anchor="middle" fill="#9ca3af" font-size="8">46 Python files | 5 Model Adapters | 6 Action Handlers | 3 Device Backends | FAISS 2048d + Neo4j | 13 Memory Types</text>
