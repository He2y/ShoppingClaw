<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" width="960" height="680">
<style>
text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", "Microsoft JhengHei", "SimHei", sans-serif; }
</style>
<defs>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#059669"/></marker>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker>
<filter id="shadow" x="-5%" y="-5%" width="115%" height="115%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.08"/></filter>
<filter id="shadow-light" x="-5%" y="-5%" width="115%" height="115%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.05"/></filter>
</defs>
<rect width="960" height="680" fill="#ffffff"/>
<text x="480" y="32" text-anchor="middle" fill="#111827" font-size="18" font-weight="700">ShoppingClaw Memory Retrieval Flow — RetrievalGateway Engine</text>
<rect x="340" y="55" width="280" height="40" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
<text x="480" y="73" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">VLM Thinking Text</text>
<text x="480" y="88" text-anchor="middle" fill="#6b7280" font-size="10">e.g. "not sure which shoe to pick, need to compare prices"</text>
<line x1="480" y1="95" x2="480" y2="118" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
<rect x="290" y="120" width="380" height="44" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
<text x="480" y="138" text-anchor="middle" fill="#065f46" font-size="13" font-weight="700">RetrievalGateway.check_and_retrieve(thinking, step)</text>
<text x="480" y="156" text-anchor="middle" fill="#047857" font-size="10">Monitor agent thinking for confusion / retrieval signals</text>
<line x1="480" y1="164" x2="480" y2="188" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
<polygon points="480,190 560,225 480,260 400,225" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow-light)"/>
<text x="480" y="222" text-anchor="middle" fill="#9a3412" font-size="11" font-weight="600">Cooldown?</text>
<text x="480" y="238" text-anchor="middle" fill="#9a3412" font-size="9">step - last &lt; 3?</text>
<line x1="560" y1="225" x2="630" y2="225" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
<text x="575" y="218" text-anchor="middle" fill="#dc2626" font-size="9" font-weight="600">YES</text>
<rect x="635" y="207" width="160" height="36" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
<text x="715" y="223" text-anchor="middle" fill="#991b1b" font-size="11" font-weight="600">Skip Retrieval</text>
<text x="715" y="237" text-anchor="middle" fill="#991b1b" font-size="9">Context stays minimal</text>
<line x1="480" y1="260" x2="480" y2="288" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
<text x="465" y="278" text-anchor="middle" fill="#059669" font-size="9" font-weight="600">NO</text>
<rect x="160" y="290" width="640" height="50" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
<text x="480" y="310" text-anchor="middle" fill="#6b21a8" font-size="12" font-weight="700">5 Signal Types Detection (priority-ordered keyword matching)</text>
<rect x="120" y="350" width="120" height="52" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
<text x="180" y="368" text-anchor="middle" fill="#991b1b" font-size="10" font-weight="600">Stagnation</text>
<text x="180" y="390" text-anchor="middle" fill="#991b1b" font-size="8">same action
>= 2x</text>
<rect x="260" y="350" width="120" height="52" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
<text x="320" y="368" text-anchor="middle" fill="#9a3412" font-size="10" font-weight="600">Product
Lookup</text>
<text x="320" y="390" text-anchor="middle" fill="#9a3412" font-size="8">price/color/
size queries</text>
<rect x="400" y="350" width="120" height="52" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="460" y="368" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="600">Comparison</text>
<text x="460" y="390" text-anchor="middle" fill="#1e40af" font-size="8">compare/
cheaper/better</text>
<rect x="540" y="350" width="120" height="52" rx="6" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
<text x="600" y="368" text-anchor="middle" fill="#6b21a8" font-size="10" font-weight="600">Calculation</text>
<text x="600" y="390" text-anchor="middle" fill="#6b21a8" font-size="8">total/sum/
add up</text>
<rect x="680" y="350" width="120" height="52" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
<text x="740" y="368" text-anchor="middle" fill="#065f46" font-size="10" font-weight="600">Uncertainty</text>
<text x="740" y="390" text-anchor="middle" fill="#065f46" font-size="8">not sure/
forgot/remember</text>
<line x1="180" y1="340" x2="180" y2="348" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
<line x1="320" y1="340" x2="320" y2="348" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
<line x1="460" y1="340" x2="460" y2="348" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
<line x1="600" y1="340" x2="600" y2="348" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
<line x1="740" y1="340" x2="740" y2="348" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
<rect x="30" y="418" width="900" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
<text x="46" y="436" fill="#64748b" font-size="10" font-weight="700" letter-spacing="0.06em">CONTEXT BUILDERS — Mapping Intent to RetrievalResult</text>
<rect x="42" y="448" width="168" height="82" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
<text x="126" y="466" text-anchor="middle" fill="#059669" font-size="10" font-weight="600">recall</text>
<text x="126" y="482" text-anchor="middle" fill="#6b7280" font-size="9">_build_recall_context()</text>
<text x="126" y="498" text-anchor="middle" fill="#111827" font-size="9">Last 8 steps summary</text>
<text x="126" y="511" text-anchor="middle" fill="#111827" font-size="9">+ keyword recall</text>
<text x="126" y="524" text-anchor="middle" fill="#111827" font-size="9">+ user constraints</text>
<rect x="218" y="448" width="168" height="82" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
<text x="302" y="466" text-anchor="middle" fill="#ea580c" font-size="10" font-weight="600">product_lookup</text>
<text x="302" y="482" text-anchor="middle" fill="#6b7280" font-size="9">_build_product_context()</text>
<text x="302" y="498" text-anchor="middle" fill="#111827" font-size="9">Product name, price,</text>
<text x="302" y="511" text-anchor="middle" fill="#111827" font-size="9">specs + constraints</text>
<text x="302" y="524" text-anchor="middle" fill="#111827" font-size="9">Fallback: all products</text>
<rect x="394" y="448" width="168" height="82" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
<text x="478" y="466" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="600">price_compare</text>
<text x="478" y="482" text-anchor="middle" fill="#6b7280" font-size="9">_build_comparison_context()</text>
<text x="478" y="498" text-anchor="middle" fill="#111827" font-size="9">Table: name | price | spec</text>
<text x="478" y="511" text-anchor="middle" fill="#111827" font-size="9">+ cheapest product</text>
<text x="478" y="524" text-anchor="middle" fill="#111827" font-size="9">(needs >= 2 products)</text>
<rect x="570" y="448" width="168" height="82" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
<text x="654" y="466" text-anchor="middle" fill="#7c3aed" font-size="10" font-weight="600">calculate</text>
<text x="654" y="482" text-anchor="middle" fill="#6b7280" font-size="9">_build_calculation_context()</text>
<text x="654" y="498" text-anchor="middle" fill="#111827" font-size="9">Cart items + total</text>
<text x="654" y="511" text-anchor="middle" fill="#111827" font-size="9">+ all browsed prices</text>
<text x="654" y="524" text-anchor="middle" fill="#111827" font-size="9">(triggers on total/sum)</text>
<rect x="746" y="448" width="168" height="82" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
<text x="830" y="466" text-anchor="middle" fill="#dc2626" font-size="10" font-weight="600">stagnation</text>
<text x="830" y="482" text-anchor="middle" fill="#6b7280" font-size="9">leads to recall</text>
<text x="830" y="498" text-anchor="middle" fill="#111827" font-size="9">Recent step history</text>
<text x="830" y="511" text-anchor="middle" fill="#111827" font-size="9">helps agent break</text>
<text x="830" y="524" text-anchor="middle" fill="#111827" font-size="9">out of action loop</text>
<line x1="480" y1="540" x2="480" y2="568" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
<rect x="280" y="570" width="400" height="40" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
<text x="480" y="588" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="700">RetrievalResult → Injected into VLM Context</text>
<text x="480" y="603" text-anchor="middle" fill="#3b82f6" font-size="10">triggered=True + context_text + products_found + source</text>
<path d="M 280 590 L 50 590 L 50 75 L 340 75" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow-gray)"/>
<rect x="30" y="310" width="130" height="20" rx="4" fill="#ffffff" fill-opacity="0.95" stroke="#e5e7eb" stroke-width="1"/>
<text x="95" y="324" text-anchor="middle" fill="#6b7280" font-size="9">Next iteration: +3 cooldown</text>
<rect x="20" y="633" width="920" height="38" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="36" y="653" fill="#64748b" font-size="10" font-weight="700">LEGEND</text>
<line x1="36" y1="653" x2="60" y2="653" stroke="#2563eb" stroke-width="2"/>
<text x="66" y="657" fill="#6b7280" font-size="9">Main flow</text>
<line x1="155" y1="653" x2="179" y2="653" stroke="#059669" stroke-width="2"/>
<text x="185" y="657" fill="#6b7280" font-size="9">Memory retrieval</text>
<line x1="300" y1="653" x2="324" y2="653" stroke="#ea580c" stroke-width="2"/>
<text x="330" y="657" fill="#6b7280" font-size="9">Decision / Lookup</text>
<line x1="450" y1="653" x2="474" y2="653" stroke="#dc2626" stroke-width="2"/>
<text x="480" y="657" fill="#6b7280" font-size="9">Skip / Block</text>
<line x1="580" y1="653" x2="604" y2="653" stroke="#7c3aed" stroke-width="2"/>
<text x="610" y="657" fill="#6b7280" font-size="9">Calculation</text>
<line x1="710" y1="653" x2="734" y2="653" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="740" y="657" fill="#6b7280" font-size="9">---  Cycle / Cooldown</text>
</svg>