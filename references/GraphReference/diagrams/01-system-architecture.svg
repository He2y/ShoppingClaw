<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="grad-title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" fill="url(#grad-title)" font-size="20" font-weight="700">ShoppingGraph 系统整体架构</text>
  <text x="480" y="52" text-anchor="middle" fill="#6b7280" font-size="11">面向手机购物App的多层次知识图谱驱动智能体</text>

  <!-- === Layer backgrounds === -->

  <!-- Layer 1: 用户输入 -->
  <rect x="30" y="70" width="900" height="70" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="42" y="86" fill="#64748b" font-size="9" font-weight="700" letter-spacing="0.08em">输入层 INPUT</text>

  <!-- Layer 2: 意图解析 -->
  <rect x="30" y="155" width="900" height="115" rx="10" fill="#eff6ff" fill-opacity="0.4" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="42" y="171" fill="#2563eb" font-size="9" font-weight="700" letter-spacing="0.08em">意图解析层 INTENT RESOLUTION</text>

  <!-- Layer 3: 路径规划 -->
  <rect x="30" y="285" width="900" height="145" rx="10" fill="#f0fdf4" fill-opacity="0.3" stroke="#a7f3d0" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="42" y="301" fill="#059669" font-size="9" font-weight="700" letter-spacing="0.08em">路径规划层 PATH PLANNING (PTG 为核心)</text>

  <!-- Layer 4: 执行监控 -->
  <rect x="30" y="445" width="900" height="140" rx="10" fill="#fff7ed" fill-opacity="0.4" stroke="#fed7aa" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="42" y="461" fill="#ea580c" font-size="9" font-weight="700" letter-spacing="0.08em">执行监控层 EXECUTION &amp; MONITORING</text>

  <!-- === Nodes === -->

  <!-- User input -->
  <rect x="330" y="82" width="300" height="42" rx="21" fill="#1e40af" filter="url(#shadow)"/>
  <text x="480" y="108" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">"我想买500元以内的蓝牙耳机"</text>

  <!-- Arrow: user -> intent resolution -->
  <line x1="480" y1="124" x2="480" y2="155" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- Intent resolution nodes -->
  <rect x="60" y="180" width="180" height="36" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="203" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">意图分类</text>

  <rect x="280" y="180" width="180" height="36" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="370" y="203" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">实体提取 &amp; 约束识别</text>

  <rect x="500" y="180" width="180" height="36" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="590" y="203" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">意图嵌入向量化</text>

  <rect x="720" y="180" width="180" height="36" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="810" y="203" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">路径候选生成</text>

  <!-- Arrows between intent nodes -->
  <line x1="240" y1="198" x2="278" y2="198" stroke="#93c5fd" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="460" y1="198" x2="498" y2="198" stroke="#93c5fd" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="680" y1="198" x2="718" y2="198" stroke="#93c5fd" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <!-- BPL & CKG helpers -->
  <rect x="190" y="226" width="130" height="28" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="255" y="245" text-anchor="middle" fill="#7c3aed" font-size="10" font-weight="600">BPL 模式匹配</text>

  <rect x="340" y="226" width="130" height="28" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="405" y="245" text-anchor="middle" fill="#059669" font-size="10" font-weight="600">CKG 类目解析</text>

  <line x1="150" y1="216" x2="255" y2="225" stroke="#c4b5fd" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow-purple)"/>
  <line x1="370" y1="216" x2="405" y2="225" stroke="#86efac" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow-green)"/>

  <!-- Big arrow: intent -> PTG -->
  <line x1="810" y1="216" x2="810" y2="240"/>
  <path d="M 810,240 C 810,260 810,280 810,290" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- PTG core -->
  <rect x="330" y="310" width="300" height="50" rx="10" fill="#059669" filter="url(#shadow)"/>
  <text x="480" y="333" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">页面转换图 (PTG)</text>
  <text x="480" y="350" text-anchor="middle" fill="#dcfce7" font-size="10">PageNode + TransitionEdge + 动态区域</text>

  <!-- PTG sub components -->
  <rect x="60" y="310" width="200" height="50" rx="8" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="332" text-anchor="middle" fill="#047857" font-size="12" font-weight="600">向量索引 FAISS</text>
  <text x="160" y="350" text-anchor="middle" fill="#6b7280" font-size="9">截图嵌入 + 意图向量 int8</text>

  <rect x="630" y="310" width="270" height="50" rx="8" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="765" y="332" text-anchor="middle" fill="#047857" font-size="12" font-weight="600">IntentPathIndex 混合检索</text>
  <text x="765" y="350" text-anchor="middle" fill="#6b7280" font-size="9">向量检索 → 页面过滤 → 综合排序</text>

  <!-- Arrows to PTG -->
  <line x1="260" y1="335" x2="328" y2="335" stroke="#059669" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="630" y1="335" x2="630" y2="335" stroke="#059669" stroke-width="1.2"/> <!-- bidirectional via text -->

  <!-- Dynamic content annotation -->
  <rect x="60" y="375" width="410" height="44" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="265" y="393" text-anchor="middle" fill="#92400e" font-size="11" font-weight="600">创新点：动态内容区域标记</text>
  <text x="265" y="410" text-anchor="middle" fill="#a16207" font-size="9">静态UI结构(精确匹配) + 动态内容(模板匹配) = 容忍内容变化的页面识别</text>

  <!-- Path cache -->
  <rect x="510" y="375" width="200" height="44" rx="8" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="610" y="393" text-anchor="middle" fill="#047857" font-size="12" font-weight="600">路径缓存</text>
  <text x="610" y="410" text-anchor="middle" fill="#6b7280" font-size="9">TOP-20高频意图预计算最优路径</text>

  <rect x="740" y="375" width="160" height="44" rx="8" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="820" y="393" text-anchor="middle" fill="#047857" font-size="12" font-weight="600">图谱优化</text>
  <text x="820" y="410" text-anchor="middle" fill="#6b7280" font-size="9">合并/剪枝/预计算</text>

  <!-- Arrow: PTG -> execution -->
  <path d="M 480,360 L 480,445" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Execution nodes -->
  <rect x="60" y="470" width="200" height="48" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="491" text-anchor="middle" fill="#c2410c" font-size="13" font-weight="600">路径执行</text>
  <text x="160" y="508" text-anchor="middle" fill="#6b7280" font-size="9">逐步执行 action_sequence</text>

  <rect x="290" y="470" width="200" height="48" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="390" y="491" text-anchor="middle" fill="#c2410c" font-size="13" font-weight="600">页面校验</text>
  <text x="390" y="508" text-anchor="middle" fill="#6b7280" font-size="9">截图嵌入比对当前页</text>

  <rect x="520" y="470" width="200" height="48" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="491" text-anchor="middle" fill="#c2410c" font-size="13" font-weight="600">异常检测 &amp; 回退</text>
  <text x="620" y="508" text-anchor="middle" fill="#6b7280" font-size="9">失败3次→重新规划路径</text>

  <rect x="750" y="470" width="150" height="48" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="825" y="491" text-anchor="middle" fill="#c2410c" font-size="13" font-weight="600">增量更新</text>
  <text x="825" y="508" text-anchor="middle" fill="#6b7280" font-size="9">成功/失败计数</text>

  <line x1="260" y1="494" x2="288" y2="494" stroke="#fdba74" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <line x1="490" y1="494" x2="518" y2="494" stroke="#fdba74" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <line x1="720" y1="494" x2="748" y2="494" stroke="#fdba74" stroke-width="1.2" marker-end="url(#arrow-orange)"/>

  <!-- Feedback loop -->
  <path d="M 900,494 C 940,494 940,335 900,335" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <text x="930" y="420" fill="#7c3aed" font-size="9" transform="rotate(90, 930, 420)">增量学习反馈</text>

  <!-- Data flow labels -->
  <text x="480" y="270" text-anchor="middle" fill="#6b7280" font-size="10">意图向量 + 类目路径 + 行为模式</text>

  <!-- Legend -->
  <g transform="translate(32, 565)">
    <rect x="0" y="0" width="896" height="44" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <text x="16" y="18" fill="#374151" font-size="10" font-weight="700">图例</text>

    <line x1="80" y1="14" x2="110" y2="14" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
    <text x="116" y="18" fill="#6b7280" font-size="10">意图解析流</text>

    <line x1="216" y1="14" x2="246" y2="14" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <text x="252" y="18" fill="#6b7280" font-size="10">路径规划流</text>

    <line x1="352" y1="14" x2="382" y2="14" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
    <text x="388" y="18" fill="#6b7280" font-size="10">执行控制流</text>

    <line x1="488" y1="14" x2="518" y2="14" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
    <text x="524" y="18" fill="#6b7280" font-size="10">学习反馈</text>

    <rect x="624" y="8" width="14" height="14" rx="3" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
    <text x="644" y="18" fill="#6b7280" font-size="10">核心创新点</text>

    <rect x="744" y="8" width="14" height="14" rx="3" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="764" y="18" fill="#6b7280" font-size="10">功能模块</text>
  </g>
</svg>
