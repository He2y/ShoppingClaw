<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 650" width="960" height="650">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="960" height="650" fill="#ffffff"/>

  <text x="480" y="32" text-anchor="middle" fill="#1e40af" font-size="18" font-weight="700">三层知识图谱架构</text>
  <text x="480" y="52" text-anchor="middle" fill="#6b7280" font-size="10">PTG（核心）+ CKG（辅助）+ BPL（优化）→ IntentPathIndex（统一检索入口）</text>

  <!-- ====== PTG 核心层 (center, big) ====== -->
  <rect x="210" y="80" width="540" height="220" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="2" stroke-dasharray="8,4" filter="url(#shadow)"/>
  <text x="230" y="100" fill="#059669" font-size="10" font-weight="800" letter-spacing="0.08em">核心层 CORE — PTG 页面转换图 (5MB)</text>

  <!-- PTG internal: graph visualization -->
  <!-- Page nodes as circles -->
  <circle cx="320" cy="155" r="30" fill="#ffffff" stroke="#059669" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="320" y="151" text-anchor="middle" fill="#047857" font-size="9" font-weight="600">首页</text>
  <text x="320" y="164" text-anchor="middle" fill="#6b7280" font-size="7">home</text>

  <circle cx="460" cy="130" r="26" fill="#ffffff" stroke="#059669" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="460" y="126" text-anchor="middle" fill="#047857" font-size="9" font-weight="600">搜索</text>
  <text x="460" y="139" text-anchor="middle" fill="#6b7280" font-size="7">search</text>

  <circle cx="460" cy="195" r="26" fill="#ffffff" stroke="#059669" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="460" y="191" text-anchor="middle" fill="#047857" font-size="8" font-weight="600">分类</text>
  <text x="460" y="204" text-anchor="middle" fill="#6b7280" font-size="7">category</text>

  <circle cx="600" cy="155" r="28" fill="#ffffff" stroke="#059669" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="600" y="148" text-anchor="middle" fill="#047857" font-size="8" font-weight="600">结果页</text>
  <text x="600" y="161" text-anchor="middle" fill="#6b7280" font-size="7">result</text>

  <circle cx="680" cy="210" r="28" fill="#ffffff" stroke="#059669" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="680" y="203" text-anchor="middle" fill="#047857" font-size="8" font-weight="600">详情</text>
  <text x="680" y="216" text-anchor="middle" fill="#6b7280" font-size="7">detail</text>

  <circle cx="600" cy="265" r="26" fill="#ffffff" stroke="#059669" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="600" y="261" text-anchor="middle" fill="#047857" font-size="9" font-weight="600">购物车</text>
  <text x="600" y="274" text-anchor="middle" fill="#6b7280" font-size="7">cart</text>

  <circle cx="460" y="265" r="26" fill="#ffffff" stroke="#059669" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="460" y="261" text-anchor="middle" fill="#047857" font-size="9" font-weight="600">结算</text>
  <text x="460" y="274" text-anchor="middle" fill="#6b7280" font-size="7">checkout</text>

  <!-- Edges (transitions) -->
  <line x1="348" y1="145" x2="434" y2="136" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="348" y1="170" x2="434" y2="189" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="486" y1="130" x2="574" y2="150" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="486" y1="195" x2="574" y2="160" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="625" y1="170" x2="658" y2="195" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="610" y1="183" x2="610" y2="239" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="574" y1="265" x2="486" y2="265" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Dynamic region callout -->
  <rect x="270" y="160" width="1" height="1" fill="none"/>
  <line x1="600" y1="145" x2="730" y2="100" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="732" y="80" width="200" height="55" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="832" y="97" text-anchor="middle" fill="#92400e" font-size="9" font-weight="700">DynamicRegion 标记</text>
  <text x="832" y="112" text-anchor="middle" fill="#a16207" font-size="8">商品列表 → TEMPLATE 匹配</text>
  <text x="832" y="126" text-anchor="middle" fill="#a16207" font-size="8">导航栏 → EXACT 匹配</text>

  <!-- Node legend -->
  <rect x="270" y="300" width="12" height="12" rx="3" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
  <text x="290" y="311" fill="#6b7280" font-size="9">PageNode (500个, 截图嵌入+VLM描述+UI元素)</text>

  <!-- Edge type legend -->
  <line x1="540" y1="306" x2="570" y2="306" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="578" y="311" fill="#6b7280" font-size="9">TransitionEdge (2000条, 成功率+耗时+前置条件)</text>

  <!-- ====== CKG 辅助层 (top-left) ====== -->
  <rect x="30" y="80" width="155" height="240" rx="10" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#shadow-sm)"/>
  <text x="107" y="102" text-anchor="middle" fill="#7c3aed" font-size="10" font-weight="800" letter-spacing="0.06em">辅助层 AUX — CKG</text>
  <text x="107" y="116" text-anchor="middle" fill="#7c3aed" font-size="8">类目知识图谱 (2MB)</text>

  <!-- Category tree -->
  <rect x="55" y="132" width="105" height="22" rx="5" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="107" y="147" text-anchor="middle" fill="#7c3aed" font-size="8">数码</text>

  <line x1="107" y1="154" x2="107" y2="163" stroke="#c4b5fd" stroke-width="0.8"/>

  <rect x="43" y="164" width="56" height="22" rx="5" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="71" y="179" text-anchor="middle" fill="#7c3aed" font-size="8">手机通讯</text>

  <rect x="118" y="164" width="56" height="22" rx="5" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="146" y="179" text-anchor="middle" fill="#7c3aed" font-size="8">电脑办公</text>

  <line x1="71" y1="186" x2="71" y2="195" stroke="#c4b5fd" stroke-width="0.8"/>
  <line x1="146" y1="186" x2="146" y2="195" stroke="#c4b5fd" stroke-width="0.8"/>

  <rect x="40" y="196" width="64" height="22" rx="5" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="72" y="211" text-anchor="middle" fill="#7c3aed" font-size="8">智能手机</text>

  <rect x="110" y="196" width="64" height="22" rx="5" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="142" y="211" text-anchor="middle" fill="#5b21b6" font-size="8" font-weight="600">耳机</text>

  <line x1="72" y1="218" x2="72" y2="227" stroke="#c4b5fd" stroke-width="0.8"/>

  <rect x="48" y="228" width="44" height="22" rx="5" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="70" y="243" text-anchor="middle" fill="#7c3aed" font-size="7">有线</text>

  <rect x="98" y="228" width="44" height="22" rx="5" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="120" y="243" text-anchor="middle" fill="#7c3aed" font-size="7">蓝牙</text>

  <!-- CKG description -->
  <text x="107" y="275" text-anchor="middle" fill="#7c3aed" font-size="8">关键词: 耳机,蓝牙,</text>
  <text x="107" y="288" text-anchor="middle" fill="#7c3aed" font-size="8">无线,降噪,TWS...</text>
  <text x="107" y="308" text-anchor="middle" fill="#6b7280" font-size="7">关联PTG: search→result</text>

  <!-- Arrow: CKG → IntentPathIndex -->
  <path d="M 185,200 C 220,200 220,300 250,330" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-purple)"/>
  <text x="210" y="270" fill="#7c3aed" font-size="8">类目→路径</text>

  <!-- ====== BPL 优化层 (top-right) ====== -->
  <rect x="775" y="80" width="155" height="260" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#shadow-sm)"/>
  <text x="852" y="102" text-anchor="middle" fill="#ea580c" font-size="10" font-weight="800" letter-spacing="0.06em">优化层 OPT — BPL</text>
  <text x="852" y="116" text-anchor="middle" fill="#ea580c" font-size="8">行为模式库 (0.4MB)</text>

  <!-- Pattern cards -->
  <rect x="790" y="132" width="125" height="46" rx="6" fill="#ffffff" stroke="#fed7aa" stroke-width="1" filter="url(#shadow-sm)"/>
  <text x="852" y="148" text-anchor="middle" fill="#c2410c" font-size="9" font-weight="600">search_and_buy</text>
  <text x="852" y="162" text-anchor="middle" fill="#6b7280" font-size="7">home→search→detail→cart</text>
  <text x="852" y="174" text-anchor="middle" fill="#059669" font-size="7">SR: 78% | 6-8 步</text>

  <rect x="790" y="186" width="125" height="40" rx="6" fill="#ffffff" stroke="#fed7aa" stroke-width="1" filter="url(#shadow-sm)"/>
  <text x="852" y="202" text-anchor="middle" fill="#c2410c" font-size="9" font-weight="600">browse_category</text>
  <text x="852" y="216" text-anchor="middle" fill="#6b7280" font-size="7">home→category→result→detail</text>

  <rect x="790" y="234" width="125" height="40" rx="6" fill="#ffffff" stroke="#fed7aa" stroke-width="1" filter="url(#shadow-sm)"/>
  <text x="852" y="250" text-anchor="middle" fill="#c2410c" font-size="9" font-weight="600">price_compare</text>
  <text x="852" y="264" text-anchor="middle" fill="#6b7280" font-size="7">result↔detail 往返比价</text>

  <rect x="790" y="282" width="125" height="28" rx="6" fill="#ffffff" stroke="#fed7aa" stroke-width="1" filter="url(#shadow-sm)"/>
  <text x="852" y="300" text-anchor="middle" fill="#c2410c" font-size="9" font-weight="600">check_order</text>

  <text x="852" y="330" text-anchor="middle" fill="#6b7280" font-size="7">共 200+ 通用行为模式</text>

  <!-- Arrow: BPL → IntentPathIndex -->
  <path d="M 775,260 C 740,260 740,370 700,370" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-orange)"/>

  <!-- ====== IntentPathIndex 连接层 (bottom) ====== -->
  <rect x="230" y="330" width="500" height="110" rx="12" fill="#eff6ff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="354" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="800">IntentPathIndex 意图-路径索引 (统一检索入口)</text>

  <!-- Three search stages -->
  <rect x="252" y="368" width="142" height="42" rx="7" fill="#ffffff" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="323" y="385" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="600">① 向量检索</text>
  <text x="323" y="402" text-anchor="middle" fill="#6b7280" font-size="8">意图嵌入 → FAISS top-k</text>

  <rect x="409" y="368" width="142" height="42" rx="7" fill="#ffffff" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="480" y="385" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="600">② 页面过滤</text>
  <text x="480" y="402" text-anchor="middle" fill="#6b7280" font-size="8">当前页可达性检查</text>

  <rect x="566" y="368" width="142" height="42" rx="7" fill="#ffffff" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="637" y="385" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="600">③ 综合排序</text>
  <text x="637" y="402" text-anchor="middle" fill="#6b7280" font-size="8">优先级×成功率×步数</text>

  <line x1="394" y1="389" x2="407" y2="389" stroke="#93c5fd" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="551" y1="389" x2="564" y2="389" stroke="#93c5fd" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <!-- Output -->
  <text x="480" y="433" text-anchor="middle" fill="#1e40af" font-size="10">输出: 排序后的候选路径列表 → 最优路径进入执行层</text>

  <!-- Arrow down to execution -->
  <path d="M 480,440 L 480,480" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Execution zone -->
  <rect x="280" y="482" width="400" height="36" rx="10" fill="#1e40af" filter="url(#shadow)"/>
  <text x="480" y="505" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">执行 + 监控 + 增量学习</text>

  <line x1="480" y1="518" x2="480" y2="532" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <!-- Final output -->
  <rect x="330" y="534" width="300" height="36" rx="18" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="557" text-anchor="middle" fill="#047857" font-size="13" font-weight="700">任务完成</text>

  <!-- Design principle callout -->
  <rect x="32" y="480" width="220" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="142" y="500" text-anchor="middle" fill="#475569" font-size="9" font-weight="700">设计原则</text>
  <text x="48" y="520" fill="#6b7280" font-size="8">1. 图结构是基础，但要剪枝</text>
  <text x="48" y="537" fill="#6b7280" font-size="8">2. 经验多级组织，向量索引</text>
  <text x="48" y="554" fill="#6b7280" font-size="8">3. RAG优於遍历，意图引导</text>
  <text x="48" y="571" fill="#6b7280" font-size="8">4. 移动端轻量，量化压缩</text>

  <rect x="725" y="500" width="205" height="75" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="827" y="520" text-anchor="middle" fill="#475569" font-size="9" font-weight="700">关键取舍</text>
  <text x="740" y="538" fill="#6b7280" font-size="8">❌ 完整商品图谱 → ✅ 类目层级</text>
  <text x="740" y="554" fill="#6b7280" font-size="8">❌ 深度个性化 → ✅ 通用行为模式</text>
  <text x="740" y="570" fill="#6b7280" font-size="8">❌ 跨App比价 → ✅ 单App深优化</text>

  <!-- Legend -->
  <g transform="translate(32, 608)">
    <rect x="0" y="0" width="896" height="32" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="14" y="10" width="10" height="10" rx="2" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
    <text x="30" y="19" fill="#6b7280" font-size="9">PTG 核心</text>
    <rect x="100" y="10" width="10" height="10" rx="2" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="116" y="19" fill="#6b7280" font-size="9">CKG 辅助</text>
    <rect x="186" y="10" width="10" height="10" rx="2" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
    <text x="202" y="19" fill="#6b7280" font-size="9">BPL 优化</text>
    <rect x="272" y="10" width="10" height="10" rx="2" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.2"/>
    <text x="288" y="19" fill="#6b7280" font-size="9">IntentPathIndex</text>
    <text x="460" y="19" fill="#9ca3af" font-size="9">| 虚线 = 数据查询 | 实线 = 流程方向 | 高亮框 = 命中匹配</text>
  </g>
</svg>
