<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 650" width="960" height="650">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-sm" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="960" height="650" fill="#ffffff"/>

  <text x="480" y="30" text-anchor="middle" fill="#1e40af" font-size="18" font-weight="700">ShoppingGraph 三层图谱架构</text>
  <text x="480" y="48" text-anchor="middle" fill="#6b7280" font-size="10">PTG（核心 5MB）+ CKG（辅助 2MB）+ BPL（优化 0.4MB）→ IntentPathIndex 统一检索</text>

  <!-- ============================================================ -->
  <!-- TOP HALF: Agent execution flow (意图解析 → 路径规划 → 执行)   -->
  <!-- ============================================================ -->

  <!-- Input -->
  <rect x="330" y="68" width="300" height="36" rx="18" fill="#1e40af" filter="url(#shadow)"/>
  <text x="480" y="91" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">"买500元以内的蓝牙耳机"</text>
  <line x1="480" y1="104" x2="480" y2="125" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- 意图解析层 -->
  <rect x="230" y="127" width="500" height="70" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="150" fill="#1e40af" font-size="12" font-weight="700">意图解析层</text>
  <text x="360" y="150" fill="#6b7280" font-size="9">意图分类 → 实体提取 → 约束识别</text>

  <rect x="395" y="162" width="145" height="27" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
  <text x="467" y="179" text-anchor="middle" fill="#2563eb" font-size="9">输出: intent_vector (384d)</text>

  <!-- BPL/CKG called by intent resolution -->
  <rect x="260" y="162" width="75" height="27" rx="5" fill="#ede9fe" stroke="#c4b5fd" stroke-width="0.8"/>
  <text x="297" y="180" text-anchor="middle" fill="#7c3aed" font-size="8">→ BPL</text>

  <rect x="600" y="162" width="75" height="27" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="637" y="180" text-anchor="middle" fill="#059669" font-size="8">→ CKG</text>

  <line x1="480" y1="197" x2="480" y2="218" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- 路径规划层 (PTG core) -->
  <rect x="230" y="220" width="500" height="68" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="243" fill="#047857" font-size="12" font-weight="700">路径规划层 (PTG 页面转换图)</text>
  <text x="430" y="243" fill="#6b7280" font-size="9">候选路径检索 → 动态内容匹配 → 最优选择</text>

  <rect x="310" y="254" width="340" height="27" rx="6" fill="#ffffff" stroke="#a7f3d0" stroke-width="1"/>
  <text x="480" y="272" text-anchor="middle" fill="#059669" font-size="9">检索: 当前页对齐 + 成功率排序 + 步数优化 → 输出路径</text>

  <line x1="480" y1="288" x2="480" y2="310" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- 执行监控层 -->
  <rect x="230" y="312" width="500" height="50" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="335" fill="#c2410c" font-size="12" font-weight="700">执行监控层</text>
  <text x="380" y="335" fill="#6b7280" font-size="9">路径执行 → 页面校验 → 异常回退 → 增量更新</text>

  <rect x="330" y="345" width="300" height="10" rx="3" fill="#fed7aa" opacity="0.5"/>

  <!-- ============================================================ -->
  <!-- SEPARATOR: "粘合层" label -->
  <!-- ============================================================ -->
  <line x1="60" y1="385" x2="900" y2="385" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>
  <rect x="380" y="375" width="200" height="20" rx="4" fill="#ffffff"/>
  <text x="480" y="390" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">IntentPathIndex 统一检索（粘合层）</text>

  <!-- ============================================================ -->
  <!-- BOTTOM HALF: Three knowledge stores with IntentPathIndex -->
  <!-- ============================================================ -->

  <!-- PTG store (center, largest) -->
  <rect x="300" y="410" width="360" height="215" rx="12" fill="#f0fdf4" stroke="#059669" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="480" y="435" text-anchor="middle" fill="#059669" font-size="13" font-weight="800">PTG 页面转换图 (核心, ~5MB)</text>
  <text x="480" y="452" text-anchor="middle" fill="#047857" font-size="9">节点: PageNode × 500 | 边: TransitionEdge × 2000 | 索引: FAISS int8</text>

  <!-- PTG internal: mini graph -->
  <circle cx="400" cy="485" r="18" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
  <text x="400" y="489" text-anchor="middle" fill="#047857" font-size="8">首页</text>
  <circle cx="480" cy="470" r="16" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
  <text x="480" y="474" text-anchor="middle" fill="#047857" font-size="7">搜索</text>
  <circle cx="560" cy="485" r="18" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
  <text x="560" y="489" text-anchor="middle" fill="#047857" font-size="8">结果</text>
  <circle cx="560" cy="530" r="16" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
  <text x="560" y="534" text-anchor="middle" fill="#047857" font-size="7">详情</text>
  <circle cx="480" y="550" r="16" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
  <text x="480" y="554" text-anchor="middle" fill="#047857" font-size="7">购物车</text>

  <line x1="417" y1="480" x2="464" y2="473" stroke="#6ee7b7" stroke-width="1"/>
  <line x1="496" y1="470" x2="543" y2="481" stroke="#6ee7b7" stroke-width="1"/>
  <line x1="568" y1="500" x2="568" y2="514" stroke="#6ee7b7" stroke-width="1"/>
  <line x1="553" y1="543" x2="496" y2="548" stroke="#6ee7b7" stroke-width="1"/>

  <!-- Dynamic region callout -->
  <line x1="560" y1="475" x2="660" y2="450" stroke="#f59e0b" stroke-width="0.8" stroke-dasharray="3,3"/>
  <rect x="630" y="430" width="28" height="28" rx="4" fill="#fef3c7" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="644" y="449" text-anchor="middle" fill="#92400e" font-size="12">⚡</text>

  <!-- PTG features -->
  <text x="400" y="585" fill="#6b7280" font-size="8">screenshot_embedding</text>
  <line x1="400" y1="590" x2="400" y2="595" stroke="#6ee7b7" stroke-width="1"/>
  <text x="400" y="608" fill="#6b7280" font-size="8">→ IntentPathIndex</text>

  <text x="560" y="585" fill="#f59e0b" font-size="8">DynamicRegion 标记</text>
  <line x1="560" y1="590" x2="560" y2="595" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="560" y="608" fill="#f59e0b" font-size="8">模板 vs 精确匹配</text>

  <!-- CKG store (left) -->
  <rect x="40" y="410" width="220" height="215" rx="10" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="435" text-anchor="middle" fill="#7c3aed" font-size="12" font-weight="700">CKG 类目知识图谱 (辅助, ~2MB)</text>
  <text x="150" y="452" text-anchor="middle" fill="#7c3aed" font-size="8">节点: CategoryNode × 2000</text>

  <!-- Category tree -->
  <rect x="75" y="468" width="70" height="20" rx="4" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="110" y="482" text-anchor="middle" fill="#7c3aed" font-size="8">数码</text>
  <line x1="110" y1="488" x2="110" y2="496" stroke="#c4b5fd" stroke-width="0.8"/>

  <rect x="62" y="497" width="50" height="20" rx="4" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="87" y="511" text-anchor="middle" fill="#7c3aed" font-size="7">手机通讯</text>
  <rect x="118" y="497" width="50" height="20" rx="4" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="143" y="511" text-anchor="middle" fill="#7c3aed" font-size="7">电脑办公</text>

  <line x1="87" y1="517" x2="87" y2="525" stroke="#c4b5fd" stroke-width="0.8"/>
  <line x1="143" y1="517" x2="143" y2="525" stroke="#c4b5fd" stroke-width="0.8"/>

  <rect x="52" y="526" width="70" height="20" rx="4" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="87" y="540" text-anchor="middle" fill="#5b21b6" font-size="8" font-weight="600">耳机</text>

  <line x1="87" y1="546" x2="87" y2="554" stroke="#c4b5fd" stroke-width="0.8"/>

  <rect x="62" y="555" width="40" height="18" rx="4" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="82" y="568" text-anchor="middle" fill="#7c3aed" font-size="7">有线</text>
  <rect x="108" y="555" width="40" height="18" rx="4" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="128" y="568" text-anchor="middle" fill="#7c3aed" font-size="7">蓝牙</text>

  <text x="150" y="600" fill="#6b7280" font-size="8">keywords + access_paths</text>
  <line x1="150" y1="605" x2="150" y2="612" stroke="#c4b5fd" stroke-width="1"/>
  <text x="150" y="622" fill="#6b7280" font-size="8">→ IntentPathIndex</text>

  <!-- BPL store (right) -->
  <rect x="700" y="410" width="220" height="215" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="810" y="435" text-anchor="middle" fill="#ea580c" font-size="12" font-weight="700">BPL 行为模式库 (优化, ~0.4MB)</text>
  <text x="810" y="452" text-anchor="middle" fill="#ea580c" font-size="8">模式: BehaviorPattern × 200</text>

  <!-- Pattern cards -->
  <rect x="720" y="465" width="180" height="32" rx="5" fill="#ffffff" stroke="#fed7aa" stroke-width="1" filter="url(#shadow-sm)"/>
  <text x="810" y="480" text-anchor="middle" fill="#c2410c" font-size="9" font-weight="600">search_and_buy (SR 78%)</text>
  <text x="810" y="492" text-anchor="middle" fill="#6b7280" font-size="7">home→search→detail→cart→checkout</text>

  <rect x="720" y="504" width="180" height="26" rx="5" fill="#ffffff" stroke="#fed7aa" stroke-width="1" filter="url(#shadow-sm)"/>
  <text x="810" y="516" text-anchor="middle" fill="#c2410c" font-size="9" font-weight="600">browse_category</text>
  <text x="810" y="527" text-anchor="middle" fill="#6b7280" font-size="7">home→category→result→detail</text>

  <rect x="720" y="537" width="180" height="26" rx="5" fill="#ffffff" stroke="#fed7aa" stroke-width="1" filter="url(#shadow-sm)"/>
  <text x="810" y="549" text-anchor="middle" fill="#c2410c" font-size="9" font-weight="600">price_compare</text>
  <text x="810" y="560" text-anchor="middle" fill="#6b7280" font-size="7">result ↔ detail 往返比价</text>

  <rect x="720" y="570" width="180" height="26" rx="5" fill="#ffffff" stroke="#fed7aa" stroke-width="1" filter="url(#shadow-sm)"/>
  <text x="810" y="582" text-anchor="middle" fill="#c2410c" font-size="9" font-weight="600">check_order</text>
  <text x="810" y="593" text-anchor="middle" fill="#6b7280" font-size="7">home→profile→order_list→detail</text>

  <text x="810" y="618" fill="#6b7280" font-size="8">intent_embedding + typical_flow</text>
  <line x1="810" y1="623" x2="810" y2="630" stroke="#fed7aa" stroke-width="1"/>
  <text x="810" y="638" fill="#6b7280" font-size="8">→ IntentPathIndex</text>

  <!-- ============================================================ -->
  <!-- IntentPathIndex connection arrows (from each store upward)  -->
  <!-- ============================================================ -->

  <!-- PTG → IntentPathIndex -->
  <rect x="430" y="395" width="100" height="15" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="480" y="406" text-anchor="middle" fill="#2563eb" font-size="8" font-weight="600">path_sequence</text>

  <path d="M 480,395 L 480,410" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- CKG → IntentPathIndex -->
  <text x="230" y="405" fill="#7c3aed" font-size="8" font-weight="600">category_ids</text>
  <path d="M 260,517 C 300,517 300,400 290,400" fill="none" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#arrow-purple)"/>

  <!-- BPL → IntentPathIndex -->
  <text x="700" y="405" fill="#ea580c" font-size="8" font-weight="600">pattern_id</text>
  <path d="M 700,500 C 660,500 660,400 670,400" fill="none" stroke="#ea580c" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#arrow-orange)"/>

  <!-- Legend -->
  <g transform="translate(32, 612)">
    <rect x="0" y="0" width="896" height="32" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="12" y="10" width="10" height="10" rx="2" fill="#f0fdf4" stroke="#059669" stroke-width="1.5"/>
    <text x="28" y="19" fill="#6b7280" font-size="9" font-weight="600">PTG 核心</text>
    <rect x="100" y="10" width="10" height="10" rx="2" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="116" y="19" fill="#6b7280" font-size="9" font-weight="600">CKG 辅助</text>
    <rect x="190" y="10" width="10" height="10" rx="2" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
    <text x="206" y="19" fill="#6b7280" font-size="9" font-weight="600">BPL 优化</text>
    <rect x="280" y="10" width="10" height="10" rx="2" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="296" y="19" fill="#6b7280" font-size="9" font-weight="600">IntentPathIndex</text>
    <text x="450" y="19" fill="#9ca3af" font-size="9">| 虚线 = 索引查询 | 实线 = 流程方向 | 高亮 = 当前匹配</text>
  </g>
</svg>
